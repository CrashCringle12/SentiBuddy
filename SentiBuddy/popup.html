<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Client Tool</title>
    <link rel="stylesheet" href="css/popup.css">
</head>

<body>
    <div class="container">
        <div class="header-row">
            <div class="brand">
                <div class="brand-title">
                    <img src="icon.png" alt="SentiBuddy icon" class="brand-icon">
                    <h1>SentiBuddy</h1>
                </div>
                <p>Queue, Client, Development, and OSINT tools in one place</p>
            </div>
        </div>

        <div class="nav">
            <button id="queueBtn">Operations</button>
            <button id="clientBtn" class="active">Client Info</button>
            <button id="developmentBtn">Development</button>
            <button id="themeToggleBtn" title="Toggle dark mode">🌙</button>
            <button id="settingsBtn" title="Open settings">⚙️</button>
        </div>

        <div id="queueSection" class="section-card" style="display: none;">
            <div id="grouping">
                <senti-button id="openDashboard" color="#0078D4" text-color="#FFFFFF" icon="\1F4CA" size="sm"
                    text="Open Dashboard" tooltip="Open the Dashboard"></senti-button>
                <senti-button id="notificationToggle" color="#D83B01" text-color="#FFFFFF" icon="\1F514" size="sm"
                    text="Notifications: Off" tooltip="Toggle Desktop Notifications"></senti-button>
                <senti-button id="startQueueFiltering" color="#D83B01" text-color="#FFFFFF" icon="\23F3" size="sm"
                    text="Queue Filter: Off" tooltip="Toggle Queue Filtering"></senti-button>
                <senti-button id="toggleTimerCount" color="#D83B01" text-color="#FFFFFF" icon="\23F2" size="sm"
                    text="Timer/Count: Off" tooltip="Toggle Timer/Count Display"></senti-button>
            </div>

            <div id="osintSection" class="embedded-tools">
                <h2 class="section-subtitle">Tools</h2>
                <div class="tools-grid">
                    <senti-button id="checkIp" color="#0078D4" text-color="#FFFFFF" icon="\1F50D" size="sm" text="Check IP"
                        tooltip="Run OSINT on IP Address in clipboard"></senti-button>
                    <senti-button id="checkHash" color="#0078D4" text-color="#FFFFFF" icon="\1F512" size="sm" text="Check Hash"
                        tooltip="Run OSINT on Hash in clipboard"></senti-button>
                    <senti-button id="defangURL" color="#0078D4" text-color="#FFFFFF" icon="\1F517" size="sm" text="Defang URL"
                        tooltip="Attempt to Defang the URL in your clipboard"></senti-button>
                </div>
                <input type="text" id="osintInput" placeholder="Enter IP address or hash..." />
                <div id="results" class="osint-links"></div>
                <button id="copyAllBtn" class="copy-btn" style="display: none; margin-top: 10px;">Copy All</button>
            </div>
        </div>

        <div id="clientSection" class="section-card">
            <button id="revealBtn">Reveal</button>
            <input type="text" id="searchBox" placeholder="Search by Code..." />
            <div class="spoiler" id="spoilerContent">
                <table>
                    <thead id="tableHead"></thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>

        <div id="developmentSection" class="section-card" style="display: none;">
            <button id="revealBtn2">Reveal</button>
            <input type="text" id="devSearchBox" placeholder="Search by Client..." />
            <div class="spoiler" id="spoilerContent2">
                <table>
                    <thead id="devTableHead"></thead>
                    <tbody id="devTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>
    <script src="popup.js"></script>
    <script src="components/senti-button.js"></script>
</body>

</html>
