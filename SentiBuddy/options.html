<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>SentiBuddy</title>
    <link rel="stylesheet" href="css/options.css">
</head>

<body>
    <div class="page-shell">
        <header class="page-header">
            <div>
                <h1>Extension Configuration</h1>
                <p>Manage queue behavior, notifications, integrations, and filters.</p>
            </div>
            <button id="optionsThemeToggle" class="button ghost" type="button" title="Toggle dark mode">🌙 Theme</button>
        </header>

        <div class="tab">
            <button id="generalOptionsTab" class="tablinks">General Options</button>
        </div>

        <div id="GeneralOptions" class="tabcontent">
            <section class="card actions-card">
                <button id="save" class="button" title="Save configuration">💾 Save</button>
                <button id="export" class="button secondary" title="Export configuration">⤴ Export</button>
                <button id="import" class="button secondary" title="Import configuration">⤵ Import</button>
                <div id="status" aria-live="polite"></div>
            </section>

            <section class="card">
                <h2>Remote Configuration</h2>
                <label class="field-label" for="configDataURL">Config Link</label>
                <div class="inline-field">
                    <input type="text" id="configDataURL" />
                    <button type="button" id="useConfigFromUrl" class="button">Pull</button>
                </div>
            </section>

            <section class="card">
                <h2>Behavior</h2>
                <label class="toggle-row" for="removeFromQueue">
                    <span>Remove Matches From Queue</span>
                    <input type="checkbox" id="removeFromQueue" />
                </label>
                <label class="toggle-row" for="desktopNotifications">
                    <span>Enable Desktop Notifications</span>
                    <input type="checkbox" id="desktopNotifications" />
                </label>
                <label class="toggle-row" for="alertOnLatest">
                    <span>Only Notify On Latest</span>
                    <input type="checkbox" id="alertOnLatest" />
                </label>
                <label class="toggle-row" for="toggleExperiments">
                    <span>Show Experimental Features</span>
                    <input type="checkbox" id="toggleExperiments" />
                </label>
            </section>

            <section class="card">
                <h2>Integration Keys</h2>
                <label class="field-label" for="abuseipdbAPIkey">AbuseIPDB API Key</label>
                <input type="password" id="abuseipdbAPIkey" autocomplete="off">

                <label class="field-label" for="vtkey">VirusTotal API Key</label>
                <input type="password" id="vtkey" autocomplete="off">

                <label class="field-label" for="ipInfoKey">IPInfo API Key</label>
                <input type="password" id="ipInfoKey" autocomplete="off">

                <label class="field-label" for="scamalyticsURL">Scamalytics URL</label>
                <input type="password" id="scamalyticsURL" autocomplete="off">
            </section>

            <section class="card">
                <h2>Regex Filters</h2>

                <div class="pattern-group">
                    <label class="field-label"><b>Filter Title Regex Patterns</b></label>
                    <div id="titlePatterns"></div>
                    <button type="button" id="addTitlePattern" class="button secondary">Add Pattern</button>
                </div>

                <div class="pattern-group">
                    <label class="field-label"><b>Filter Tags Regex Patterns</b></label>
                    <div id="tagPatterns"></div>
                    <button type="button" id="addTagPattern" class="button secondary">Add Pattern</button>
                </div>

                <div class="pattern-group">
                    <label class="field-label"><b>Filter Owner Regex Patterns</b></label>
                    <div id="ownerPatterns"></div>
                    <button type="button" id="addOwnerPattern" class="button secondary">Add Pattern</button>
                </div>
            </section>
        </div>
    </div>
    <script src="options.js"></script>
</body>

</html>
