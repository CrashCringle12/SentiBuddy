<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <style>
        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            display: flex;
            height: 100vh;
        }
        
        .sidebar {
            width: 270px;
            background-color: #f4f4f4;
            overflow-y: auto;
            padding: 10px;
            box-shadow: 2px 0 5px rgba(0, 0, 0, 0.1);
        }

        .sidebar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .sidebar-header select {
            font-size: 12px;
            padding: 4px;
        }
        .client-box {
            display: flex;
            flex-direction: row;
            align-items: center;
            background: #fff;
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: box-shadow 0.3s ease;
            justify-content: space-between;
        }
        .client-box:hover {
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        .client-info {
            flex: 1;
        }
        .client-info h3 {
            margin: 0;
            font-size: 16px;
        }
        .client-info p {
            margin: 0;
            font-size: 12px;
            color: #777;
        }
        .sparkline {
            width: 90px;
            height: 40px;
            margin: 0 10px;
        }
        .stats {
            text-align: right;
            font-size: 12px;
            min-width: 60px;
        }
        .stats strong {
            display: block;
            font-size: 14px;
        }
        
        .main-panel {
            flex: 1;
            padding: 20px;
        }
        #chart-container {
            width: 60%;
            height: 400px;
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 8px rgba(0,0,0,0.1);
        }
        canvas {
            width: 100% !important;
            height: 100% !important;
        }
        .dashboard-wrapper {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .main-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .recent-bar {
            display: flex;
            font-family: 'Times New Roman', sans-serif;
            align-items: center;
            padding: 10px 20px;
            background: #fff;
            border-bottom: 1px solid #ddd;
            font-size: 14px;
            overflow-x: auto;
            gap: 20px;
        }

        .recent-label {
            font-weight: bold;
            margin-right: 10px;
            flex-shrink: 0;
        }

        .recent-item {
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .recent-arrow {
            font-size: 14px;
        }

        #stats-box {
            margin-top: 20px;
            background: #fff;
            padding: 16px;
            border-radius: 10px;
            box-shadow: 0 0 8px rgba(0, 0, 0, 0.05);
            max-width: 600px;
            color: #444;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .stat-row span {
            font-weight: bold;
        }
        .range-bar-wrapper {
            margin-bottom: 16px;
        }

        .range-labels {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            margin-bottom: 4px;
        }

        .range-bar {
            height: 6px;
            background: #ddd;
            border-radius: 5px;
            position: relative;
        }

        .range-dot {
            width: 12px;
            height: 12px;
            background: #333;
            border-radius: 50%;
            position: absolute;
            top: -3px;
        }

        .range-value-label {
            position: absolute;
            top: 12px;
            font-size: 12px;
            color: #666;
            transform: translateX(-50%);
        }
        #sort-dropdown-wrapper {
            position: relative;
            cursor: pointer;
            user-select: none;
            }

            #sort-label {
            font-size: 13px;
            color: #333;
            padding: 4px 8px;
            background-color: #f0f0f0;
            border-radius: 6px;
            display: inline-block;
            }

            .custom-sort-options {
            display: none;
            position: absolute;
            top: 30px;
            left: 0;
            width: 200px;
            background: #fff;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.05);
            z-index: 10;
            }

            .custom-sort-options div {
            padding: 8px 12px;
            font-size: 13px;
            color: #333;
            border-bottom: 1px solid #eee;
            }

            .custom-sort-options div:hover {
            background-color: #e0e0e0;
            }

            .custom-sort-options div:last-child {
            border-bottom: none;
            }


    </style>
</head>

<body>
    <div class="dashboard-wrapper">
        <div id="recent-bar" class="recent-bar"></div>
        <div class="main-layout">
            <div class="sidebar">
                <div class="sidebar-header" id="sort-dropdown-wrapper">
                    <span id="sort-label">GLOBAL MARKET ▼</span>
                    <div id="sort-options-menu" class="custom-sort-options">
                      <div data-sort="alpha-asc">Alphabetical ASC</div>
                      <div data-sort="alpha-desc">Alphabetical DESC</div>
                      <div data-sort="inc-high">Most Incidents</div>
                      <div data-sort="inc-low">Least Incidents</div>
                      <div data-sort="change-high">Highest Change</div>
                      <div data-sort="change-low">Least Change</div>
                    </div>
                  </div>                  
                
                <div id="sidebar"></div>
            </div>
          <div class="main-panel">
            <div id="client-info"></div>
            <div id="chart-container">
              <canvas id="chart"></canvas>
            </div>
            <div id="stats-box">
                <div class="range-bar-wrapper">
                    <div class="range-labels">
                        <span id="range-min-label">0</span>
                        <span id="range-max-label">100</span>
                    </div>
                    <div class="range-bar">
                        <div class="range-dot" id="range-dot"></div>
                        <div class="range-value-label" id="range-value-label">0</div>
                    </div>
                </div>
                <div class="stat-row">
                    <div>Average Trend Value:</div>
                    <span id="averageTrend">0</span>
                </div>
                <div class="stat-row">
                    <div>Minimum:</div>
                    <span id="minTrend">0</span>
                </div>
                <div class="stat-row">
                    <div>Maximum:</div>
                    <span id="maxTrend">0</span>
                </div>
                <hr>
                <div class="stat-row">
                    <div>Most Common:</div>
                    <span id="mostCommon">None</span>
                </div>
                <div class="stat-row">
                    <div>Least Common:</div>
                    <span id="leastCommon">None</span>
                </div>
            </div>         
          </div>
        </div>
      </div>      
    <script src="Chart.js"></script>
    <script src="dashboard.js"></script>

</body>
</html>
